name: windows-build
on:
  push:
    branches: [ "Playerbot" ]
  pull_request:
    branches: [ "Playerbot" ]

concurrency:
  group: ${{ github.head_ref }} || concat(${{ github.ref }}, ${{ github.workflow }})
  cancel-in-progress: true

jobs:
  windows-build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }}
    env:
      BOOST_ROOT: C:\local\boost_1_82_0
    steps:
      - uses: actions/checkout@v4
      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2.13
      - name: Configure OS
        shell: bash
        env:
          CONTINUOUS_INTEGRATION: true
        run: |
          ./acore.sh install-deps
      - name: Build
        shell: bash
        run: |
          export CTOOLS_BUILD=all
          ./acore.sh compiler build
      # new step: confirm exist directory
      - name: Debug Directory
        shell: powershell
        run: |
          Get-ChildItem -Path "azerothcore-wotlk/env" -Recurse
      # new step: zip directory
      - name: Zip Artifacts
        shell: powershell
        run: |
          $timestamp = Get-Date -Format "yyyyMMdd-HHmmss"
          $zipName = "acore-env-$timestamp.zip"
          Compress-Archive `
            -Path "azerothcore-wotlk/env\*" `
            -DestinationPath $zipName `
            -CompressionLevel Optimal
          echo "ZIP_PATH=$zipName" >> $env:GITHUB_ENV

      # new step: upload to Artifacts
      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: acore-env-build
          path: ${{ env.ZIP_PATH }}
